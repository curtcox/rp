version: rp.dev/v0.1
capabilities:
  run_lint:
    purpose: observe
    kind: command
    inputs:
      codebase:
        type: SourceTree
    outputs:
      lint_result:
        type: CommandResult
        assertions:
          - subject: codebase
            predicate: lint_clean
            confidence: observed
            when:
              exit_code: 0
            evidence_source: command_result
    command:
      cwd: "."
      argv:
        - ./scripts/run_lint.sh
      stdout:
        save_as_artifact: lint.stdout
        media_type: text/plain
    always_record_result: true
    effects:
      external: local_process
      filesystem:
        writes: []
    nondeterminism: []
    idempotence: idempotent
    cost:
      time: cheap
      money_usd: 0
      risk: low
      human_attention: none
  run_tests:
    purpose: observe
    kind: command
    inputs:
      codebase:
        type: SourceTree
    outputs:
      test_result:
        type: CommandResult
        assertions:
          - subject: codebase
            predicate: tests_pass
            confidence: observed
            when:
              exit_code: 0
            evidence_source: process_exit
    command:
      cwd: "."
      argv:
        - ./scripts/run_tests.sh
      stdout:
        save_as_artifact: tests.stdout
        media_type: text/plain
    always_record_result: true
    effects:
      external: local_process
      filesystem:
        writes: []
    nondeterminism: []
    idempotence: idempotent
    cost:
      time: cheap
      money_usd: 0
      risk: low
      human_attention: none
  run_scan:
    purpose: observe
    kind: command
    inputs:
      codebase:
        type: SourceTree
    outputs:
      scan_result:
        type: CommandResult
        assertions:
          - subject: codebase
            predicate: scan_clean
            confidence: observed
            when:
              exit_code: 0
            evidence_source: command_result
    command:
      cwd: "."
      argv:
        - ./scripts/run_scan.sh
      stdout:
        save_as_artifact: scan.stdout
        media_type: text/plain
    always_record_result: true
    effects:
      external: local_process
      filesystem:
        writes: []
    nondeterminism: []
    idempotence: idempotent
    cost:
      time: cheap
      money_usd: 0
      risk: low
      human_attention: none
  create_pull_request:
    purpose: derive
    kind: command
    inputs:
      codebase:
        type: SourceTree
        requires:
          - predicate: lint_clean
            min_confidence: observed
          - predicate: tests_pass
            min_confidence: observed
          - predicate: scan_clean
            min_confidence: observed
    outputs:
      release_candidate:
        type: ReleaseCandidate
        realization:
          kind: file
          media_type: application/json
        assertions:
          - subject: release_candidate
            predicate: pr_ready
            confidence: observed
            when:
              exit_code: 0
            evidence_source: command_result
    command:
      cwd: "."
      argv:
        - ./scripts/create_pull_request.sh
      stdout:
        save_as:
          resource: release_candidate
          artifact_path: artifacts/release.json
          media_type: application/json
    always_record_result: true
    effects:
      external: create_pull_request
      external_side_effects:
        create_pull_request: true
      filesystem:
        writes:
          - ".rp/runs/${run.id}/artifacts/release.json"
    nondeterminism:
      - external_process
    idempotence: non_idempotent
    cost:
      time: moderate
      money_usd: 0
      risk: high
      human_attention: approval_if_required
