version: rp.dev/v0.1
capabilities:
  propose_patch_with_script:
    purpose: derive
    kind: command
    inputs:
      repo:
        type: GitRepo
        requires:
          - predicate: clean_worktree
            min_confidence: observed
      bug_report:
        type: BugReport
        realization:
          media_type: text/markdown
    outputs:
      patch:
        type: Patch
        realization:
          kind: file
          media_type: text/x-diff
        assertions:
          - subject: patch
            predicate: addresses_bug
            confidence: claimed
            evidence_source: process_output
    command:
      cwd: "${inputs.repo.path}"
      argv:
        - ./scripts/propose_patch.sh
        - "${inputs.bug_report.path}"
      stdout:
        save_as:
          resource: patch
          artifact_path: artifacts/proposed.patch
          media_type: text/x-diff
    effects:
      external: local_process
      filesystem:
        writes:
          - ".rp/runs/${run.id}/artifacts/proposed.patch"
    nondeterminism:
      - external_process
    idempotence: unknown
    cost:
      time: moderate
      money_usd: 0
      risk: medium
      human_attention: none
